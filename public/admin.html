<body>
  <div id="nav-slot"></div>

    <div class="container-wide">
      <div class="crumbs"><a href="/">Home</a> · <a href="/dashboard">Dashboard</a> · <span>Admin</span></div>

      <div id="tab-users" class="tab-panel hidden"></div>
